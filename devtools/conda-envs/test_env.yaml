name: openff-toolkit-test
channels:
  - conda-forge
dependencies:
    # Base depends
  - python
  - versioningit
  - packaging
  - numpy <2.3
  - networkx
  - cachetools
  # https://github.com/openforcefield/openff-toolkit/issues/2150
  - xmltodict <=1.0.2
  - python-constraint
  - openmm >=7.6
  - openff-forcefields >=2023.05.1
  - openff-units
  - openff-amber-ff-ports
  - openff-utilities >=0.1.5
  - openff-interchange-base >=0.5
  - openff-nagl-base >=0.4.0
  - openff-nagl-models >=0.3.0
  - typing_extensions
    # Toolkit-specific
  - ambertools >=22

    # Test-only/optional/dev/typing
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-rerunfailures
  - pytest-timeout
  - pyyaml
  - toml
  - bson
  - msgpack-python
  - pydantic
  - qcelemental
  - qcportal >=0.50
  - qcengine
  - nglview
  - mdtraj
  - nbval

name: openeye-examples
channels:
  - conda-forge
dependencies:
    # Base depends
  - python
  - packaging
  - numpy
  - networkx
  - cachetools
  # https://github.com/openforcefield/openff-toolkit/issues/2150
  - xmltodict <=1.0.2
  - python-constraint
  - openmm >=7.6
  - openff-forcefields >=2025
  - openff-amber-ff-ports >=0.0.3
  - openff-units
  - openff-utilities >=0.1.5
  - openff-interchange-base >=0.5
  - openff-nagl-base >=0.5.3
  - openff-nagl-models >=2025
  - nglview
    # Toolkit-specific
  - openeye::openeye-toolkits
    # Test-only/optional/dev/typing/examples
  - pytest =8
  - pytest-xdist
  - pytest-rerunfailures
  - pyyaml
  - toml
  - bson
  - msgpack-python
  - qcelemental
  - qcportal >=0.50
  - qcengine
  - mdtraj
  - nbval
  - pdbfixer
  - gromacs >=2023.3
  - pyedr
